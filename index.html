<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no, viewport-fit=cover">

<style>
  :root{
    --hotpink:#ff3d81;
    --grape:#8b2ff2;
    --sunset:#ffb037;
    --mint:#5df2b0;
    --cream:#fff6fb;
    --ink:#2c1b3a;
    --navy:#1b1f3b;
    --red:#ef2b52;
    --blood:#8a0d17;
    --blood-dark:#22040a;
  }
  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color: transparent; /* Prevents gray highlight tap box on iOS */
  }
  html,body{
    margin:0; padding:0; width:100%; height:100%;
    height: 100dvh; /* Dynamic viewport height specifically for iOS */
    overflow:hidden;
    position: fixed; /* Hard-locks iOS background scrolling/bouncing */
    overscroll-behavior: none;
    font-family:'Quicksand',sans-serif;
    color:var(--ink);
  }
  body{
    background:linear-gradient(120deg,#ffd6ec,#e3d1ff,#ffe3c7,#ffd6ec);
    background-size:300% 300%;
    animation:gradientShift 14s ease infinite;
    padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }
  @keyframes gradientShift{
    0%{background-position:0% 50%;}
    50%{background-position:100% 50%;}
    100%{background-position:0% 50%;}
  }

  /* floating ambient particles */
  #particles{ position:fixed; inset:0; z-index:1; pointer-events:none; overflow:hidden; }
  .particle{
    position:fixed;
    bottom:-40px;
    font-size:1.4rem;
    opacity:0.8;
    animation:floatUp linear infinite;
    filter:drop-shadow(0 0 6px rgba(255,255,255,.5));
  }
  @keyframes floatUp{
    0%{ transform:translateY(0) rotate(0deg); opacity:0; }
    10%{ opacity:.85; }
    90%{ opacity:.85; }
    100%{ transform:translateY(-110vh) rotate(360deg); opacity:0; }
  }

  .stage{
    position:fixed; inset:0; z-index:5;
    display:flex; align-items:center; justify-content:center;
    flex-direction:column;
    text-align:center;
    padding:24px;
    opacity:0; pointer-events:none;
    transform:scale(0.9);
    transition:opacity .55s ease, transform .55s ease;
  }
  .stage.active{ opacity:1; pointer-events:auto; transform:scale(1); }

  .card{
    background:rgba(255,255,255,.55);
    backdrop-filter:blur(18px);
    -webkit-backdrop-filter:blur(18px);

    max-width:90vw;

    font-weight:900;
    font-size:clamp(2.1rem, 7vw, 4.2rem);
    margin:0 0 10px;
    background:linear-gradient(100deg,var(--hotpink),var(--grape) 55%,var(--sunset));
    -webkit-background-clip:text;
    background-clip:text;
    color:transparent;
    animation:bounceIn 1.1s cubic-bezier(.34,1.56,.64,1) both, hueGlow 6s ease infinite;
    text-shadow:0 6px 30px rgba(255,61,129,.18);
  }
  @keyframes hueGlow{
    0%,100%{ filter:brightness(1); }
    50%{ filter:brightness(1.18); }
  }
  .sub{
    font-family:'Quicksand',sans-serif;
    font-weight:700;
    font-size:clamp(1.05rem,2.6vw,1.3rem);
    color:#7a5a8a;
    margin:0 0 30px;
    max-width:480px;
  }
  @keyframes bounceIn{
    0%{ transform:translateY(-50px) scale(.6) rotate(-4deg); opacity:0; }
    55%{ transform:translateY(8px) scale(1.06) rotate(2deg); opacity:1; }
    75%{ transform:translateY(-4px) scale(.98) rotate(-1deg); }
    100%{ transform:translateY(0) scale(1) rotate(0); }
  }

  .sparkle-deco{
    position:absolute;
    font-size:1.8rem;
    animation:spin 5s linear infinite, pulse 2.4s ease-in-out infinite;
    filter:drop-shadow(0 0 8px rgba(255,176,55,.6));
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  @keyframes pulse{ 0%,100%{ transform:scale(1) rotate(0);} 50%{ transform:scale(1.25) rotate(180deg);} }

  /* ---- proposal buttons ---- */
  .btn-row{
    display:flex; gap:30px; align-items:center; justify-content:center;
    position:relative; width:100%; height:130px;
  }
  .btn{
    font-family:'Poppins',sans-serif;
    font-weight:800;
    font-size:1.2rem;
    padding:19px 44px;
    border:none;
    border-radius:999px;
    cursor:pointer;
    letter-spacing:.02em;
    box-shadow:0 12px 28px rgba(0,0,0,.18);

    touch-action: manipulation; /* Disables fast double-tap zooming on iOS */
  }
  .btn:active{ transform:scale(.94); }
  .btn-yes{
    background:linear-gradient(135deg,var(--mint),var(--hotpink));
    background-size:200% 200%;
    color:#fff;
    animation:pulseGlow 1.8s ease-in-out infinite, shine 4s ease infinite;
  }
  @keyframes pulseGlow{
    0%,100%{ box-shadow:0 12px 28px rgba(255,61,129,.35); }
    50%{ box-shadow:0 16px 40px rgba(255,61,129,.6); }
  }
  @keyframes shine{
    0%{ background-position:0% 50%; } 50%{ background-position:100% 50%; } 100%{ background-position:0% 50%; }
  }
  .btn-yes:hover{ transform:translateY(-4px) scale(1.05); }
  
  .btn-no{
    background:linear-gradient(135deg,var(--red),var(--navy));
    touch-action:none;
    -webkit-tap-highlight-color:transparent;
    color:#fff;
    position:fixed;
    z-index:20;
    transition:top .26s cubic-bezier(.34,1.4,.4,1), left .26s cubic-bezier(.34,1.4,.4,1), transform .15s ease;
  }
  .btn-no.wobble{ animation:wobble .35s ease; }
  @keyframes wobble{
    0%,100%{ transform:rotate(0deg); }
    25%{ transform:rotate(-8deg) scale(1.05); }
    75%{ transform:rotate(8deg) scale(1.05); }
  }

  /* ---- sound toggle ---- */
  .sound-toggle{
    position:fixed; 
    top: calc(18px + env(safe-area-inset-top)); 
    right: calc(18px + env(safe-area-inset-right)); 
    z-index:100;
    width:50px; height:50px; border-radius:50%;
    background:rgba(255,255,255,.7);
    backdrop-filter:blur(8px);
    -webkit-backdrop-filter:blur(8px);
    border:2px solid rgba(255,255,255,.9);
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    box-shadow:0 6px 20px rgba(139,47,242,.25);
    font-size:1.4rem;
    transition:transform .15s ease;
    touch-action: manipulation;
  }
  .sound-toggle:hover{ transform:scale(1.1) rotate(-8deg); }

  /* ---- date page ---- */
  input[type="datetime-local"]{
    font-family:'Quicksand',sans-serif;
    font-weight:700;
    font-size: 16px; /* CRITICAL: Enforced to be exactly/at least 16px to prevent automatic viewport zoom on iOS Safari */
    padding:15px 20px;
    border-radius:18px;
    border:3px solid var(--hotpink);
    background:#fff;
    color:var(--ink);
    margin-bottom:26px;
    outline:none;
    box-shadow:0 4px 14px rgba(255,61,129,.15);
    -webkit-appearance: none; /* Strip native Apple styling to match custom UI */
    width: 100%;
    max-width: 280px;
  }
  input[type="datetime-local"]:focus{ box-shadow:0 0 0 5px rgba(255,61,129,.25); }
  
  .btn-submit{
    background:linear-gradient(135deg,var(--hotpink),var(--sunset));
    color:#fff;
    font-family:'Poppins',sans-serif;
    font-weight:800;
    font-size:1.1rem;
    padding:16px 42px;
    border:none;
    border-radius:999px;
    cursor:pointer;
    box-shadow:0 12px 26px rgba(255,61,129,.32);
    transition:transform .18s ease;
    touch-action: manipulation;
  }
  .btn-submit:hover{ transform:translateY(-3px) scale(1.03); }
  .btn-submit:disabled{ opacity:.5; cursor:not-allowed; transform:none; }

  .confirm-text{
    font-family:'Poppins',sans-serif;
    font-weight:800;
    font-size:clamp(1.4rem,4.2vw,2.2rem);
    max-width:640px;
    line-height:1.55;
  }
  .confirm-text .time{
    background:linear-gradient(100deg,var(--hotpink),var(--grape));
    -webkit-background-clip:text; background-clip:text; color:transparent;
  }

  canvas#confetti-canvas, canvas#blood-canvas{
    position:fixed; inset:0; width:100%; height:100%;
    pointer-events:none; z-index:40;
  }

/* ---- consequence page ---- */
#page-consequence{

}

#page-consequence .card{

.tw-char{

  @media (prefers-reduced-motion: reduce){

</style>

<body>

<div id="particles"></div>

<script>
/* ---------------- ambient floating particles ---------------- */
(function initParticles(){
  const emojis = ['💖','✨','💕','🌸','💫','💗'];
  const container = document.getElementById('particles');
  const count = 22;
  for(let i=0;i<count;i++){
    const el = document.createElement('div');
    el.className = 'particle';
    el.textContent = emojis[Math.floor(Math.random()*emojis.length)];
    el.style.left = Math.random()*100 + 'vw';
    el.style.fontSize = (1 + Math.random()*1.6) + 'rem';
    const dur = 9 + Math.random()*10;
    el.style.animationDuration = dur + 's';
    el.style.animationDelay = (Math.random()*dur) + 's';
    container.appendChild(el);
  }
})();

/* ---------------- sound manager ---------------- */
const SoundManager = (() => {
  let muted = false;
  let ctx = null;
  
  function getCtx(){
    if(!ctx) {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
    }
    if(ctx.state==='suspended'){
      ctx.resume();
    }
    return ctx;
  }
  
  function tone(freq, dur, type='sine', gainVal=0.15, delay=0){
    if(muted) return;
    try {
      const c = getCtx();
      const osc = c.createOscillator();
      const gain = c.createGain();
      osc.type = type;
      osc.frequency.value = freq;
      gain.gain.value = gainVal;
      osc.connect(gain); gain.connect(c.destination);
      const t0 = c.currentTime + delay;
      gain.gain.setValueAtTime(gainVal, t0);
      gain.gain.exponentialRampToValueAtTime(0.0001, t0 + dur);
      osc.start(t0);
      osc.stop(t0 + dur + 0.02);
    } catch(e) {
      console.log("Audio play blocked by device standard policies:", e);
    }
  }
  return {
    toggleMute(){ muted = !muted; return muted; },
    isMuted(){ return muted; },
    unlockSafariAudio() {
      // Plays an silent note on first user interaction to unlock browser media state
      try {
        const c = getCtx();
        if (c) {
          const osc = c.createOscillator();
          const gain = c.createGain();
          gain.gain.value = 0.0001;
          osc.connect(gain);
          gain.connect(c.destination);
          osc.start(0);
          osc.stop(0.01);
        }
      } catch(e) {}
    },
    playWoosh(){ tone(520,0.12,'sine',0.12); tone(760,0.10,'sine',0.08,0.05); },
    playChime(){
      [0,0.09,0.18,0.30].forEach((d,i)=> tone(660+i*140,0.35,'triangle',0.14,d));
    },
    playDrone(){
      tone(90,1.6,'sawtooth',0.16);
      tone(70,1.8,'sawtooth',0.10,0.15);
    }
  };
})();

/* iOS Audio Context Unlockers */
function unlockAllDeviceAudio() {
  SoundManager.unlockSafariAudio();
  window.removeEventListener('click', unlockAllDeviceAudio);
  window.removeEventListener('touchstart', unlockAllDeviceAudio);
}
window.addEventListener('click', unlockAllDeviceAudio, {passive: true});
window.addEventListener('touchstart', unlockAllDeviceAudio, {passive: true});

document.getElementById('soundToggle').addEventListener('click', (e)=>{
  const muted = SoundManager.toggleMute();
  e.target.textContent = muted ? '🔇' : '🔊';
});

/* ---------------- page navigation ---------------- */
function showPage(id){
  document.querySelectorAll('.stage').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

/* ---------------- No button evasion ---------------- */
/* ---------------- No button evasion (FULL iOS FIX) ---------------- */

const noBtn = document.getElementById('noBtn');
const yesBtn = document.getElementById('yesBtn');

let evadeStart = null;
let evadeCount = 0;

const EVADE_TIME = 15000;



function repositionNoBtn(){

    const w = window.innerWidth;
    const h = window.innerHeight;

    const rect = noBtn.getBoundingClientRect();

    const btnW = rect.width || 120;
    const btnH = rect.height || 55;


    const marginX = 20;
    const marginTop = 90;
    const marginBottom = 120;


    const maxX = w - btnW - marginX;
    const maxY = h - btnH - marginBottom;


    const x =
    marginX + Math.random() * Math.max(10,maxX-marginX);


    const y =
    marginTop + Math.random() * Math.max(10,maxY-marginTop);


    noBtn.style.left = x + "px";
    noBtn.style.top = y + "px";

}



function evade(){

    if(!evadeStart){
        evadeStart = Date.now();
    }


    const elapsed = Date.now() - evadeStart;


    if(elapsed < EVADE_TIME){

        evadeCount++;

        repositionNoBtn();


        noBtn.classList.remove("wobble");
        void noBtn.offsetWidth;
        noBtn.classList.add("wobble");


        if(typeof SoundManager !== "undefined"){
            SoundManager.playWoosh();
        }

    }

}



//
// Desktop hover
//
noBtn.addEventListener(
"mouseenter",
evade
);


//
// iPhone touch
//
noBtn.addEventListener(
"touchstart",
function(e){

    if(Date.now()-evadeStart < EVADE_TIME){

        e.preventDefault();

    }

    evade();

},
{passive:false}
);


//
// Finger approaching button
//
document.addEventListener(
"touchmove",
function(e){

    if(window.innerWidth < 900){

        const touch = e.touches[0];

        const rect = noBtn.getBoundingClientRect();


        const cx = rect.left + rect.width/2;
        const cy = rect.top + rect.height/2;


        const distance = Math.hypot(
            touch.clientX-cx,
            touch.clientY-cy
        );


        if(distance < 140){

            evade();

        }

    }

},
{passive:false}
);


//
// After 15 seconds allow NO click
//
noBtn.addEventListener(
"click",
function(){

    startNoPath();

});




/* YES button */
yesBtn.addEventListener("click",()=>{showPage("page-date");});

//
// Initial position
//
window.addEventListener(
"load",
function(){

    setTimeout(
        repositionNoBtn,
        500
    );

});


//
// Rotation fix
//
window.addEventListener(
"resize",
function(){

    if(
      document
      .getElementById("page-proposal")
      .classList
      .contains("active")
    ){

        repositionNoBtn();

    }

});
// Make sure NO button appears on load
noBtn.style.left = "60%";
noBtn.style.top = "55%";
/* ---------------- date step ---------------- */
const dateInput = document.getElementById('dateInput');
const submitDateBtn = document.getElementById('submitDateBtn');

// Listening to input + change ensures Safari registers all selector picks instantly
['input', 'change'].forEach(evtType => {
  dateInput.addEventListener(evtType, ()=>{
    submitDateBtn.disabled = !dateInput.value;
  });
});

submitDateBtn.addEventListener('click', ()=>{
  if(!dateInput.value) return;
  const chosen = new Date(dateInput.value);
  const pickup = new Date(chosen.getTime() - 30*60000);
  const formatted = pickup.toLocaleString('en-US', {
    month:'long', day:'numeric', year:'numeric',
    hour:'numeric', minute:'2-digit', hour12:true
  });
  document.getElementById('pickupTime').textContent = formatted;
  showPage('page-confirm');
  launchConfetti();
  SoundManager.playChime();
});

/* ---------------- confetti ---------------- */
function launchConfetti(){
  const canvas = document.getElementById('confetti-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  const colors = ['#ff3d81','#5df2b0','#ffb037','#8b2ff2','#ffe3ec','#ffffff'];
  const pieces = Array.from({length:180}, () => ({
    x: Math.random()*canvas.width,
    y: -20 - Math.random()*canvas.height*0.5,
    r: 4 + Math.random()*6,
    c: colors[Math.floor(Math.random()*colors.length)],
    vy: 2 + Math.random()*3.5,
    vx: -1.8 + Math.random()*3.6,
    rot: Math.random()*360,
    vr: -8 + Math.random()*16,
    heart: Math.random() < 0.28
  }));
  function drawHeart(ctx,size){
    ctx.beginPath();
    const s = size;
    ctx.moveTo(0, s*0.3);
    ctx.bezierCurveTo(0,-s*0.3, -s,-s*0.3, -s, s*0.1);
    ctx.bezierCurveTo(-s, s*0.5, 0, s*0.8, 0, s);
    ctx.bezierCurveTo(0, s*0.8, s, s*0.5, s, s*0.1);
    ctx.bezierCurveTo(s,-s*0.3, 0,-s*0.3, 0, s*0.3);
    ctx.closePath();
  }
  let frame = 0;
  function loop(){
    frame++;
    ctx.clearRect(0,0,canvas.width,canvas.height);
    pieces.forEach(p=>{
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      ctx.save();
      ctx.translate(p.x,p.y);
      ctx.rotate(p.rot*Math.PI/180);
      ctx.fillStyle = p.c;
      if(p.heart){
        drawHeart(ctx, p.r*0.9);
        ctx.fill();
      } else {
        ctx.fillRect(-p.r/2,-p.r/2,p.r,p.r*1.6);
      }
      ctx.restore();
    });
    if(frame < 230){
      requestAnimationFrame(loop);
    } else {
      ctx.clearRect(0,0,canvas.width,canvas.height);
    }
  }
  loop();
}

/* ---------------- No path: blood drip ---------------- */
function startNoPath(){
  const canvas = document.getElementById('blood-canvas');
  canvas.width = window.innerWidth; canvas.height = window.innerHeight;
  const ctx = canvas.getContext('2d');
  SoundManager.playDrone();

  const dripCount = 22;
  const drips = Array.from({length:dripCount}, (_,i) => ({
    x: (canvas.width/dripCount)*i + Math.random()*30,
    y: -10 - Math.random()*80,
    speed: 3 + Math.random()*4,
    width: 18 + Math.random()*26,
    started: Math.random()*40
  }));
  let frame = 0;
  let coverage = 0;

  function loop(){
    frame++;
    ctx.fillStyle = 'rgba(10,2,4,0.06)';
    ctx.fillRect(0,0,canvas.width,canvas.height);

    drips.forEach(d=>{
      if(frame < d.started) return;
      d.y += d.speed;
      const grad = ctx.createLinearGradient(0,0,0,d.y);
      grad.addColorStop(0,'#4a0509');
      grad.addColorStop(1,'#c21807');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.moveTo(d.x - d.width/2, 0);
      ctx.lineTo(d.x + d.width/2, 0);
      ctx.lineTo(d.x + d.width/2 + 6, d.y);
      ctx.quadraticCurveTo(d.x + d.width/2 + 14, d.y + 22, d.x, d.y + 34);
      ctx.quadraticCurveTo(d.x - d.width/2 - 14, d.y + 22, d.x - d.width/2 - 6, d.y);
      ctx.closePath();
      ctx.fill();
    });

    coverage = Math.min(1, frame/95);
    if(coverage > 0.55){
      ctx.fillStyle = `rgba(20,2,5,${(coverage-0.55)*1.8})`;
      ctx.fillRect(0,0,canvas.width,canvas.height);
    }

    if(frame < 130){
      requestAnimationFrame(loop);
    } else {
      showPage('page-consequence');
      setTimeout(()=>{ canvas.getContext('2d').clearRect(0,0,canvas.width,canvas.height); }, 700);
      runTypewriter();
    }
  }
  loop();
}

/* ---------------- typewriter ---------------- */
function runTypewriter(){
    const wrap = document.getElementById('twWrap');
    wrap.innerHTML = '';

    const text = "Fine... but next time there will be consequences. Very bad ones.";

    const line = document.createElement('div');
    line.className = 'tw-line';
    wrap.appendChild(line);

    [...text].forEach((ch, i)=>{
        setTimeout(()=>{
            const span = document.createElement('span');
            span.className = 'tw-char';
            span.textContent = ch;
            line.appendChild(span);
        }, i * 45);
    });
}

repositionNoBtn();

// Date validation min initialization
dateInput.min = new Date().toISOString().slice(0,16);

/* Keep no-button safely on screen during device orientation rotations */
window.addEventListener('resize', ()=>{
  if(document.getElementById('page-proposal').classList.contains('active') && evadeCount > 0){
    repositionNoBtn();
  }
});
</script>
